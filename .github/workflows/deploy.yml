name:

on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3
      
    - name: Docker login
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Image
      run:  docker build -t ${{ secrets.DOCKER_USERNAME }}/suraj-app:v1

    - name: Push Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/suraj-app:v1
