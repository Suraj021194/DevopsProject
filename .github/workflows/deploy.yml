name: CI-CD Plipeline

on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest

   # Checkout
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # Docker login
      - name: Docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build Image
      - name: Build Image
        run:  docker build -t ${{ secrets.DOCKER_USERNAME }}/suraj-app:${{ github.run_number }} .

      # Push Image
      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/suraj-app:${{ github.run_number }}

      # Setup kubectl
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      # Configure kubeconfig
      - name: Set kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" > kubeconfig
          export KUBECONFIG=$PWD/kubeconfig

      # Deploy to kubernetes
      - name: Deploy
        run: |
          kubectl set image deployment/suraj-deploy suraj-container=${{ secrets.DOCKER_USERNAME  }}/suraj-app:${{ github.run_number }}

